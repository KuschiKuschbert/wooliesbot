# Deploy locally: npm install && npx wrangler deploy
# Or use GitHub Actions workflow: .github/workflows/deploy-worker.yml (CLOUDFLARE_API_TOKEN + …)
# Secrets for runtime: GH_TOKEN + WOOLIESBOT_WRITE_SECRET (via wrangler secret put or CI job)
#
# Fill repo owner/name to match your GitHub repository (Pages source for docs/data.json).

name = "wooliesbot-write"
main = "src/index.js"
compatibility_date = "2024-11-01"

[vars]
GITHUB_REPO_OWNER = "KuschiKuschbert"
GITHUB_REPO_NAME = "wooliesbot"
# Browser Origin is scheme + host only (no /wooliesbot path).
ALLOWED_ORIGINS = "https://kuschikuschbert.github.io"
