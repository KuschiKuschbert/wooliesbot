name: Scrape & push data

on:
  workflow_dispatch:
  schedule:
    # Every 4 hours (UTC)
    - cron: "0 */4 * * *"

concurrency:
  group: wooliesbot-scrape
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
          ssh-key: ${{ secrets.SCRAPER_DEPLOY_KEY }}

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"

      - name: Telegram secrets pre-flight
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python3 - <<'PY'
          import os, sys
          missing = [k for k in ("TELEGRAM_TOKEN", "TELEGRAM_CHAT_ID") if not os.environ.get(k, "").strip()]
          if missing:
              print(f"WARNING: Telegram secret(s) not set: {', '.join(missing)}")
              print("Failure notifications will be silently skipped for this run.")
          else:
              print("Telegram secrets OK.")
          PY

      - name: Install Google Chrome
        run: |
          set -e
          wget -q -O /tmp/google-chrome.deb https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
          sudo apt-get update
          sudo apt-get install -y /tmp/google-chrome.deb

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Git identity (sync_to_github)
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

      - name: Run scrape and push docs
        env:
          GITHUB_ACTIONS: "true"
        run: python scripts/scrape_pipeline.py --notify off

      - name: Heartbeat staleness guard
        run: |
          python - <<'PY'
          import datetime as dt
          import json
          from pathlib import Path

          heartbeat_path = Path("docs/heartbeat.json")
          if not heartbeat_path.exists():
              raise SystemExit("docs/heartbeat.json missing after pipeline run")

          payload = json.loads(heartbeat_path.read_text(encoding="utf-8"))
          ts = payload.get("last_heartbeat")
          if not ts:
              raise SystemExit("docs/heartbeat.json missing last_heartbeat")

          # Handle both "...Z" and "+00:00" UTC variants.
          ts = ts.replace("Z", "+00:00")
          hb = dt.datetime.fromisoformat(ts)
          if hb.tzinfo is None:
              hb = hb.replace(tzinfo=dt.timezone.utc)
          now = dt.datetime.now(dt.timezone.utc)
          age_min = (now - hb).total_seconds() / 60
          if age_min > 180:
              raise SystemExit(f"heartbeat stale: {age_min:.1f} minutes old")
          print(f"heartbeat age OK: {age_min:.1f} minutes")
          PY

      # Confirm the workspace heartbeat actually landed on origin/main. Catches
      # silent push regressions (e.g. branch protection rejecting the push) that
      # would otherwise leave Pages stale while the workflow turns green.
      # If sync_to_github used the PR-fallback path, origin may not yet be in
      # sync at this exact moment — auto-merge still pending checks — so a
      # mismatch warns instead of failing.
      - name: Verify push landed on origin/main
        run: |
          set -e
          git fetch origin main --quiet
          LOCAL_TS=$(python3 -c 'import json; print(json.load(open("docs/heartbeat.json"))["last_heartbeat"])')
          REMOTE_TS=$(git show origin/main:docs/heartbeat.json | python3 -c 'import json,sys; print(json.load(sys.stdin)["last_heartbeat"])')
          echo "local heartbeat:  $LOCAL_TS"
          echo "remote heartbeat: $REMOTE_TS"
          if [ "$LOCAL_TS" = "$REMOTE_TS" ]; then
            echo "PUSH OK: workspace heartbeat is on origin/main."
          else
            # Either auto-merge is still pending or the push silently failed.
            # Check for an open auto-merge PR before deciding pass/fail.
            OPEN_PR=$(gh pr list --state open --search 'in:title Auto-update dashboard data' --json number --jq '.[0].number' 2>/dev/null || echo "")
            if [ -n "$OPEN_PR" ]; then
              echo "PUSH PENDING: open auto-merge PR #$OPEN_PR awaiting required checks. Not failing the workflow."
              exit 0
            fi
            echo "::error::Heartbeat on origin/main does not match workspace and no open auto-merge PR. Push silently failed."
            exit 1
          fi

      - name: Layer D audit report
        run: |
          python scripts/e2e_validate.py --layer D --all --json-out logs/e2e_validate_links_full.json

      - name: Upload Layer D audit artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: e2e-validate-links-full
          path: logs/e2e_validate_links_full.json

      # Live API vs data.json; rotates sample by last_layer_a_check (oldest/never first).
      # Raise E2E_LAYER_A_SAMPLE in env for stricter coverage (slower).
      # Do NOT add --persist-checks here — this runs post-push and must not race the auto-commit.
      - name: Layer A live price spot-check
        env:
          E2E_LAYER_A_SAMPLE: "25"
        run: |
          python scripts/e2e_validate.py --layer A --sample "${E2E_LAYER_A_SAMPLE}" --strict-exit --json-out logs/e2e_validate_layer_a.json

      - name: Upload Layer A report artifact
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: e2e-validate-layer-a
          path: logs/e2e_validate_layer_a.json

      # Belt-and-braces: if Layer A failed AND the offending commit was the
      # auto-update commit (not human work), revert it so bad data is not
      # served while the next 4 h scrape runs.
      - name: Auto-revert on Layer A red (bot commits only)
        if: failure()
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          HEAD_AUTHOR=$(git log -1 --format='%ae')
          HEAD_MSG=$(git log -1 --format='%s')
          # Match both forms the bot can produce on main:
          #   - direct push:  "Auto-update dashboard data [skip ci]"
          #   - PR auto-merge squash: "Auto-update dashboard data (#NNN)"
          if [ "$HEAD_AUTHOR" = "github-actions[bot]@users.noreply.github.com" ] && \
             echo "$HEAD_MSG" | grep -Eq '^Auto-update dashboard data( \[skip ci\]| \(#[0-9]+\))?$'; then
            echo "Layer A red on bot auto-commit — reverting HEAD"
            git revert HEAD --no-edit
            git push origin main
            python scripts/telegram_notify.py --allow-missing-secrets \
              --text "⏪ *[AUTO-REVERT]* Layer A post-push check failed\\nThe bad auto-update commit has been reverted on main\\.\\nNext scheduled scrape will re-attempt\\.\\nSee logs: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          else
            echo "HEAD is not a bot auto-commit (author=$HEAD_AUTHOR msg=$HEAD_MSG) — skipping auto-revert"
          fi

      - name: Telegram failure notification
        if: failure()
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python scripts/telegram_notify.py --allow-missing-secrets --text "🚨 *WooliesBot 4h scrape failed*\nSee workflow logs: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
