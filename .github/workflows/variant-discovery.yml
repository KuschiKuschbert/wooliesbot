name: Variant Discovery Report

on:
  workflow_dispatch:
  schedule:
    # 3am UTC every Monday
    - cron: "0 3 * * 1"

concurrency:
  group: wooliesbot-discovery
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  discover:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Git identity
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

      - name: Run variant discovery for all compare_groups
        run: |
          python scripts/discover_all_groups.py \
            --max-per-store 5 \
            --min-score 0.45 \
            --sleep-sec 2.5

      - name: Commit discovery report
        run: |
          git add docs/discovery_report.json
          if git diff --cached --quiet; then
            echo "No changes to discovery_report.json — skipping commit."
          else
            git commit -m "chore: update discovery_report.json [skip ci]"
            git push
          fi
