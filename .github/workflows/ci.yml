name: CI

on:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"

      - name: Install curl_cffi for e2e_validate imports
        run: pip install curl_cffi requests

      - name: File-size guardrails (soft ratchet)
        run: python3 scripts/check_file_sizes.py

      - name: Compile Python modules
        run: |
          python3 -m py_compile chef_os.py receipt_sync.py
          python3 -m py_compile scripts/e2e_validate.py scripts/check_inventory_identity.py scripts/smart_targets.py scripts/scrape_pipeline.py scripts/telegram_notify.py scripts/validate_household_merge.py scripts/check_compare_groups.py

      - name: Inventory identity (duplicate item_id / names)
        run: python3 scripts/check_inventory_identity.py

      - name: Compare-group taxonomy (near-dup names, mixed price_mode)
        run: python3 scripts/check_compare_groups.py

      - name: e2e Layer B (data.json internal consistency)
        run: python3 scripts/e2e_validate.py --layer B --strict-exit

      - name: e2e Layer C (dashboard eff_price vs data.json)
        run: python3 scripts/e2e_validate.py --layer C --strict-exit

      - name: Household merge contract (Python mirror)
        run: python3 scripts/validate_household_merge.py

      - name: Heartbeat timezone guard (must carry Z or numeric offset, never naive)
        run: |
          python3 << 'PY'
          import json, re, sys
          from pathlib import Path
          hb = Path("docs/heartbeat.json")
          if not hb.exists():
              print("docs/heartbeat.json missing — skipping check (first-ever run)")
              sys.exit(0)
          payload = json.loads(hb.read_text(encoding="utf-8"))
          # Both timestamp fields must end with Z or a numeric UTC offset like +10:00
          tz_aware = re.compile(r"[Zz]$|[+-]\d{2}:?\d{2}$")
          errors = []
          for field in ("last_heartbeat", "next_run"):
              val = payload.get(field)
              if val is None:
                  continue  # next_run is optional when schedule unknown
              if not tz_aware.search(str(val)):
                  errors.append(f"  {field}={val!r} — naive timestamp (no Z or offset)")
          if errors:
              print("FAIL: docs/heartbeat.json contains naive timestamps.")
              print("Ensure sync_to_github writes Z-suffixed strings (chef_os.py).")
              for e in errors:
                  print(e)
              sys.exit(1)
          print(f"OK: heartbeat.json timestamps are timezone-aware")
          PY

      - name: Block hard-coded Telegram secrets (long string fallbacks)
        run: |
          python3 << 'PY'
          import pathlib, re
          text = pathlib.Path("chef_os.py").read_text(encoding="utf-8")
          # Disallow: TELEGRAM_* = os.environ.get(...) or "<long secret>"
          if re.search(
              r"TELEGRAM_(TOKEN|CHAT_ID)\s*=.*or\s+[\"']([0-9A-Za-z:_\\-]{16,})[\"']",
              text,
              re.DOTALL,
          ):
              print("Remove hard-coded Telegram fallbacks from chef_os.py")
              raise SystemExit(1)
          print("OK")
          PY
