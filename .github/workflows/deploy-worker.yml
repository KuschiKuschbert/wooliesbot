# Deploy Cloudflare Worker from GitHub — no local wrangler after secrets are set.
# Repository secrets (Settings → Secrets and variables → Actions):
#   CLOUDFLARE_API_TOKEN      — API token with Workers Scripts: Edit
#   CLOUDFLARE_ACCOUNT_ID     — Optional; set if wrangler cannot infer the account
#   WORKER_GH_TOKEN           — GitHub PAT with repo contents read/write (docs/data.json)
#   WOOLIESBOT_WRITE_SECRET   — Same value as the dashboard X-WooliesBot-Secret header
#   WOOLIESBOT_WRITE_SECRET_PREVIOUS — Optional overlap secret during rotation
#
# If WORKER_GH_TOKEN or WOOLIESBOT_WRITE_SECRET is missing, deploy still runs; the
# "Upload Worker secrets" step logs a notice and exits 0.

name: Deploy Worker (write API)

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "workers/wooliesbot-write/**"
      - ".github/workflows/deploy-worker.yml"

concurrency:
  group: deploy-wooliesbot-worker
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: workers/wooliesbot-write

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: workers/wooliesbot-write/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Deploy Worker to Cloudflare
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy

      - name: Upload Worker secrets to Cloudflare
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          WORKER_GH_TOKEN: ${{ secrets.WORKER_GH_TOKEN }}
          WOOLIESBOT_WRITE_SECRET: ${{ secrets.WOOLIESBOT_WRITE_SECRET }}
          WOOLIESBOT_WRITE_SECRET_PREVIOUS: ${{ secrets.WOOLIESBOT_WRITE_SECRET_PREVIOUS || '' }}
        run: |
          set -e
          if [ -z "$WORKER_GH_TOKEN" ] || [ -z "$WOOLIESBOT_WRITE_SECRET" ]; then
            echo "::notice::Skipping Worker secrets — add WORKER_GH_TOKEN and WOOLIESBOT_WRITE_SECRET to repository secrets, then re-run this workflow."
            exit 0
          fi
          printf '%s' "$WORKER_GH_TOKEN" | npx wrangler secret put GH_TOKEN
          printf '%s' "$WOOLIESBOT_WRITE_SECRET" | npx wrangler secret put WOOLIESBOT_WRITE_SECRET
          if [ -n "$WOOLIESBOT_WRITE_SECRET_PREVIOUS" ]; then
            printf '%s' "$WOOLIESBOT_WRITE_SECRET_PREVIOUS" | npx wrangler secret put WOOLIESBOT_WRITE_SECRET_PREVIOUS
          fi
