# Deploy locally: npm install && npx wrangler deploy
# Or use GitHub Actions workflow: .github/workflows/deploy-worker.yml (CLOUDFLARE_API_TOKEN + …)
# Secrets for runtime: GH_TOKEN (via wrangler secret put or CI job)
#
# Fill repo owner/name to match your GitHub repository (Pages source for docs/data.json).

name = "wooliesbot-write"
main = "src/index.js"
compatibility_date = "2024-11-01"

[vars]
GITHUB_REPO_OWNER = "KuschiKuschbert"
GITHUB_REPO_NAME = "wooliesbot"
# Browser Origin is scheme + host only (no /wooliesbot path).
ALLOWED_ORIGINS = "https://kuschikuschbert.github.io"
# Identity allowlist — only when ALLOW_INSECURE_PUBLIC_WRITES = "0" (optional Cloudflare Access / headers).
ALLOWED_USER_EMAILS = "derkusch@gmail.com,mikkogram@gmail.com"
# "1" = dev-only: any client can call the write API (no Bearer); per-IP rate limit. Production: use "0" + WRITE_API_TOKENS (wrangler secret) and Pairing in the dashboard.
ALLOW_INSECURE_PUBLIC_WRITES = "0"
# Optional hybrid auth token(s), comma-separated. Keep empty to disable token auth.
# WRITE_API_TOKENS = ""
# Emergency rollback path: set to "1" to temporarily allow legacy X-WooliesBot-Secret auth.
ALLOW_LEGACY_SECRET_AUTH = "0"
