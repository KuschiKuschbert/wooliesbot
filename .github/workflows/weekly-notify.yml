name: Weekly scrape + Telegram summary

on:
  workflow_dispatch:
  schedule:
    # Sunday 09:00 UTC
    - cron: "0 9 * * 0"

concurrency:
  group: wooliesbot-weekly-notify
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  weekly:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"

      - name: Install Google Chrome
        run: |
          set -e
          wget -q -O /tmp/google-chrome.deb https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
          sudo apt-get update
          sudo apt-get install -y /tmp/google-chrome.deb

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Git identity (sync_to_github)
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

      - name: Weekly pipeline run with Telegram summary
        env:
          GITHUB_ACTIONS: "true"
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scripts/scrape_pipeline.py --notify success --weekly

      - name: Heartbeat staleness guard
        run: |
          python - <<'PY'
          import datetime as dt
          import json
          from pathlib import Path

          heartbeat_path = Path("docs/heartbeat.json")
          if not heartbeat_path.exists():
              raise SystemExit("docs/heartbeat.json missing after pipeline run")

          payload = json.loads(heartbeat_path.read_text(encoding="utf-8"))
          ts = payload.get("last_heartbeat")
          if not ts:
              raise SystemExit("docs/heartbeat.json missing last_heartbeat")

          ts = ts.replace("Z", "+00:00")
          hb = dt.datetime.fromisoformat(ts)
          now = dt.datetime.now(dt.timezone.utc)
          age_min = (now - hb).total_seconds() / 60
          if age_min > 180:
              raise SystemExit(f"heartbeat stale: {age_min:.1f} minutes old")
          print(f"heartbeat age OK: {age_min:.1f} minutes")
          PY

      - name: Telegram failure notification
        if: failure()
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python scripts/telegram_notify.py --allow-missing-secrets --text "🚨 *WooliesBot weekly run failed*\nSee workflow logs: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

  receipt-sync-after-weekly:
    name: Weekly receipt sync (self-hosted)
    needs: weekly
    if: ${{ needs.weekly.result == 'success' }}
    uses: ./.github/workflows/receipt-sync.yml
    with:
      months_back: "0.25"
      latest_only: false
      headless: true
      skip_enrich: true
